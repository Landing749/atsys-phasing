name: Build Android POC

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Generate native Android project
        run: npx expo prebuild --platform android
        env:
          CI: 1

      - name: Force JS bundle into debug APK (no Metro on standalone installs)
        run: |
          sed -i 's/^react {/react {\n    \/\/ Embed JS bundle in debug build since this APK is sideloaded with no Metro server running\n    debuggableVariants = []/' android/app/build.gradle

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: atsys-mobile-poc-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error